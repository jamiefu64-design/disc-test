<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 性格测验</title>
<style>
  :root {
    --d-color: #e74c3c;
    --i-color: #f39c12;
    --s-color: #2ecc71;
    --c-color: #3498db;
    --bg: #f5f6fa;
    --card-bg: #fff;
    --text: #2c3e50;
    --border: #e0e0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 40px 20px 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border-radius: 16px;
    margin-bottom: 30px;
  }
  .header h1 { font-size: 2em; margin-bottom: 8px; }
  .header .subtitle { opacity: 0.9; font-size: 1em; }

  .instructions {
    background: #fffbe6;
    border-left: 4px solid #f39c12;
    padding: 16px 20px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 0.95em;
  }
  .instructions h3 { margin-bottom: 8px; color: #e67e22; }
  .instructions ol { padding-left: 20px; }
  .instructions li { margin-bottom: 4px; }

  /* Name input */
  .name-section {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .name-section label {
    font-weight: 700;
    display: block;
    margin-bottom: 8px;
    font-size: 1.05em;
  }
  .name-section input {
    width: 100%;
    max-width: 300px;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1em;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-section input:focus { border-color: #667eea; }

  .section-title {
    font-size: 1.3em;
    font-weight: 700;
    margin: 32px 0 16px;
    padding: 10px 16px;
    border-radius: 8px;
    color: #fff;
  }
  .section-title.virtues { background: linear-gradient(135deg, #2ecc71, #27ae60); }
  .section-title.vices { background: linear-gradient(135deg, #e74c3c, #c0392b); }

  .question-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: all 0.2s;
  }
  .question-card.answered { border-left: 4px solid #667eea; }
  .question-card .q-num {
    display: inline-block;
    background: #667eea;
    color: #fff;
    width: 32px; height: 32px;
    line-height: 32px;
    text-align: center;
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.9em;
    margin-right: 10px;
    vertical-align: middle;
  }
  .question-card .q-label { font-weight: 600; vertical-align: middle; }

  .options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 12px;
  }
  .option-item { position: relative; }
  .option-item input[type="radio"] {
    position: absolute; opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer; margin: 0; z-index: 2;
  }
  .option-item label {
    display: flex; align-items: center; justify-content: center;
    text-align: center; height: 100%;
    padding: 10px 8px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.92em;
    transition: all 0.2s;
    background: #fafafa;
    min-height: 48px;
    word-break: break-all;
  }
  .option-item input[type="radio"]:checked + label {
    border-color: #667eea;
    background: #eef0ff;
    font-weight: 600;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  }
  .option-item input[type="radio"]:hover + label {
    border-color: #aab; background: #f0f0f5;
  }

  .submit-area { text-align: center; margin: 40px 0; }
  .btn-submit {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none;
    padding: 14px 60px;
    font-size: 1.15em;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.4);
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(102,126,234,0.5); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .progress-bar-wrap {
    margin: 20px 0; background: #e0e0e0;
    border-radius: 10px; height: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 10px;
    transition: width 0.3s;
  }
  .progress-text { text-align: center; font-size: 0.9em; color: #888; margin-top: 4px; }
  .warning { color: #e74c3c; text-align: center; font-weight: 600; margin: 8px 0; display: none; }

  /* Result overlay */
  .result-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center; align-items: center;
    padding: 20px;
  }
  .result-overlay.show { display: flex; }
  .result-modal {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .result-modal h2 { text-align: center; font-size: 1.6em; margin-bottom: 20px; color: #667eea; }
  .result-type { text-align: center; margin-bottom: 24px; }
  .result-type .primary {
    font-size: 2.5em; font-weight: 900;
    padding: 10px 30px; border-radius: 12px;
    display: inline-block; color: #fff;
  }
  .result-type .primary.d-type { background: var(--d-color); }
  .result-type .primary.i-type { background: var(--i-color); }
  .result-type .primary.s-type { background: var(--s-color); }
  .result-type .primary.c-type { background: var(--c-color); }
  .result-type .secondary { display: block; margin-top: 8px; font-size: 1.1em; color: #666; }
  .result-type .type-label { font-weight: 700; font-size: 0.4em; display: block; opacity: 0.85; letter-spacing: 2px; }

  .score-chart { margin-bottom: 24px; }
  .score-row { display: flex; align-items: center; margin-bottom: 10px; gap: 12px; }
  .score-row .type-badge {
    width: 36px; height: 36px; line-height: 36px;
    text-align: center; border-radius: 50%;
    color: #fff; font-weight: 900; font-size: 0.9em;
    flex-shrink: 0;
  }
  .score-row .type-badge.d-badge { background: var(--d-color); }
  .score-row .type-badge.i-badge { background: var(--i-color); }
  .score-row .type-badge.s-badge { background: var(--s-color); }
  .score-row .type-badge.c-badge { background: var(--c-color); }
  .score-row .type-name { width: 60px; font-weight: 600; flex-shrink: 0; }
  .score-bar-bg { flex: 1; height: 22px; background: #eee; border-radius: 11px; overflow: hidden; }
  .score-bar-fill {
    height: 100%; border-radius: 11px;
    transition: width 0.6s ease;
    display: flex; align-items: center;
    padding-left: 10px; color: #fff;
    font-weight: 700; font-size: 0.85em;
  }
  .score-bar-fill.d-fill { background: var(--d-color); }
  .score-bar-fill.i-fill { background: var(--i-color); }
  .score-bar-fill.s-fill { background: var(--s-color); }
  .score-bar-fill.c-fill { background: var(--c-color); }

  .result-detail { background: #f8f9ff; padding: 16px; border-radius: 8px; font-size: 0.9em; margin-bottom: 16px; }
  .result-detail table { width: 100%; border-collapse: collapse; }
  .result-detail th, .result-detail td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e0e0e0; }
  .result-detail th { background: #667eea; color: #fff; font-weight: 600; }

  .type-desc { display: none; padding: 16px; border-radius: 8px; margin-top: 16px; }
  .type-desc.show { display: block; }
  .type-desc h4 { margin-bottom: 8px; }
  .type-desc.d-desc { background: #fde8e8; border-left: 4px solid var(--d-color); }
  .type-desc.i-desc { background: #fef3e0; border-left: 4px solid var(--i-color); }
  .type-desc.s-desc { background: #e8f8ef; border-left: 4px solid var(--s-color); }
  .type-desc.c-desc { background: #e8f0fe; border-left: 4px solid var(--c-color); }

  .btn-close {
    display: block; margin: 16px auto 0;
    background: #667eea; color: #fff;
    border: none; padding: 10px 30px;
    border-radius: 25px; font-size: 1em; cursor: pointer;
  }

  .submit-status {
    text-align: center; margin-top: 12px;
    font-size: 0.9em; min-height: 24px;
  }
  .submit-status.success { color: #27ae60; }
  .submit-status.error { color: #e74c3c; }

  @media (max-width: 600px) {
    .options { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 1.5em; }
    .question-card { padding: 14px 12px; }
    .option-item label { font-size: 0.85em; padding: 8px 6px; min-height: 42px; }
    .result-type .primary { font-size: 1.8em; padding: 8px 20px; }
  }
</style>
  <script src="./vendor/supabase.min.js"></script>
</head>

const typeNames = {
  D: "支配型 (Dominance)",
  I: "影响型 (Influence)",
  S: "稳定型 (Steadiness)",
  C: "分析型 (Compliance)"
};

const typeDescs = {
  D: "果断、直接、有领导力，喜欢掌控局面。优点是行动力强、敢于挑战；缺点是可能显得强势、缺乏耐心。",
  I: "热情、乐观、善于社交，是天生的沟通者。优点是感染力强、创意丰富；缺点是可能冲动、缺乏条理。",

};

// ===== BUILD UI =====
function buildQuestionnaire() {
  const container = document.getElementById('questionnaire');
  let html = '';
  for (let i = 0; i < 40; i++) {
    if (i === 0) html += '<div class="section-title virtues">✅ 第一部分：优点（第 1 - 20 题）</div>';
    if (i === 20) html += '<div class="section-title vices">⚠️ 第二部分：缺点（第 21 - 40 题）</div>';
    html += `<div class="question-card" id="card${i}">`;
    html += `<span class="q-num">${i + 1}</span><span class="q-label">请选出一个最能代表你的形容词：</span>`;
    html += '<div class="options">';
    for (let j = 0; j < 4; j++) {
      html += `<div class="option-item">
        <input type="radio" name="q${i}" id="q${i}_${j}" value="${j}" data-type="${questions[i][j].type}" onchange="onAnswer(${i})">
        <label for="q${i}_${j}">${questions[i][j].text}</label></div>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function onAnswer(i) {
  document.getElementById('card' + i).classList.add('answered');
  updateProgress();
  document.getElementById('warning').style.display = 'none';
}

function updateProgress() {
  let cnt = 0;
  for (let i = 0; i < 40; i++) {
    if (document.querySelector(`input[name="q${i}"]:checked`)) cnt++;
  }
  const pct = Math.round((cnt / 40) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `已答：${cnt} / 40`;
}

// ===== COMPUTE & DISPLAY RESULT =====
function calculateResult() {
  // Validate all answered
  let firstMissing = -1;
  for (let i = 0; i < 40; i++) {
    if (!document.querySelector(`input[name="q${i}"]:checked`)) {
      if (firstMissing === -1) firstMissing = i;
    }
  }
  if (firstMissing !== -1) {
    const w = document.getElementById('warning');
    w.textContent = `⚠️ 还有题目未作答（第 ${firstMissing + 1} 题），请完成全部 40 题后再提交。`;
    w.style.display = 'block';
    document.getElementById('card' + firstMissing).scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Calculate
  const scores = { D: { v: 0, w: 0 }, I: { v: 0, w: 0 }, S: { v: 0, w: 0 }, C: { v: 0, w: 0 } };
  for (let i = 0; i < 40; i++) {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const opt = questions[i][parseInt(sel.value)];
    i < 20 ? scores[opt.type].v++ : scores[opt.type].w++;
  }
  const totals = {};
  for (const t of ['D','I','S','C']) totals[t] = scores[t].v + scores[t].w;

  // Rank
  const ranked = Object.entries({D:totals.D,I:totals.I,S:totals.S,C:totals.C}).sort((a,b)=>b[1]-a[1]);
  let primary = ranked[0][0], secondary = ranked[1][0];
  if (ranked[0][1] === ranked[1][1] && scores[ranked[0][0]].w < scores[ranked[1][0]].w) {
    [primary, secondary] = [secondary, primary];
  }

  // Show result
  showResult(totals, scores, primary, secondary);

  // Submit to backend
  const userName = document.getElementById('userName').value.trim() || '匿名';
  submitResult(userName, totals, scores, primary, secondary);
}

function showResult(totals, scores, primary, secondary) {
  const maxScore = Math.max(totals.D, totals.I, totals.S, totals.C);
  const barMax = Math.max(maxScore, 20);
  let bars = '';
  for (const t of ['D','I','S','C']) {
    const pct = Math.round((totals[t]/40)*100);
    const barPct = Math.round((totals[t]/barMax)*100);
    const marker = t===primary?' 👑':t===secondary?' 🔹':'';
    bars += `<div class="score-row">
      <div class="type-badge ${t.toLowerCase()}-badge">${t}</div>
      <div class="type-name">${typeNames[t].split(' ')[0]}</div>
      <div class="score-bar-bg"><div class="score-bar-fill ${t.toLowerCase()}-fill" style="width:${barPct}%">${totals[t]}分</div></div>
      <span style="font-weight:600;width:40px;text-align:right;">${pct}%${marker}</span></div>`;
  }
  const tcm = {D:'d-type',I:'i-type',S:'s-type',C:'c-type'};
  const dcm = {D:'d-desc',I:'i-desc',S:'s-desc',C:'c-desc'};
  document.getElementById('resultModal').innerHTML = `
    <h2>📊 你的 DISC 测验结果</h2>
    <div class="result-type">
      <div class="primary ${tcm[primary]}"><span class="type-label">主要类型</span>${typeNames[primary]}</div>
      <div class="secondary">副型：${typeNames[secondary]}</div>
    </div>
    <div class="score-chart">${bars}</div>
    <div class="result-detail"><table>
      <tr><th></th><th>优点</th><th>缺点</th><th>总分</th></tr>
      ${['D','I','S','C'].map(t=>`<tr><td><strong>${t}</strong></td><td>${scores[t].v}</td><td>${scores[t].w}</td><td><strong>${totals[t]}</strong></td></tr>`).join('')}
    </table></div>
    <div class="type-desc show ${dcm[primary]}"><h4>🔍 ${typeNames[primary]}</h4><p>${typeDescs[primary]}</p></div>
    <div class="type-desc show ${dcm[secondary]}"><h4>🔹 ${typeNames[secondary]}</h4><p>${typeDescs[secondary]}</p></div>
    <button class="btn-close" onclick="closeResult()">✕ 关闭</button>`;
  document.getElementById('resultOverlay').classList.add('show');
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

// ===== SUBMIT RESULTS =====

// 带重试的云端插入（默认 3 次，间隔递增；防高并发/弱网静默丢数据）
async function insertWithRetry(payload, maxRetries = 3) {
  let lastErr;
  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const { error } = await supabaseClient.from('disc_results').insert([payload]);
      if (error) throw error;
      return;
    } catch (e) {
      lastErr = e;
      console.warn('Supabase 提交第 ' + attempt + ' 次失败:', e);
      if (attempt < maxRetries) await new Promise(r => setTimeout(r, 600 * attempt));
    }
  }
  throw lastErr;
}

async function submitResult(userName, totals, scores, primary, secondary) {
  const statusEl = document.getElementById('submitStatus');
  statusEl.className = 'submit-status';

  // 生成结果摘要（用于复制分享）
  const typeInfo = {
    D: {name:'支配型(D)',emoji:'🟥'},
    I: {name:'影响型(I)',emoji:'🟨'},
    S: {name:'稳定型(S)',emoji:'🟩'},
    C: {name:'分析型(C)',emoji:'🟦'}
  };
  
  const summary = [
    `🧠 DISC性格测验结果`,
    `━━━━━━━━━━━━━━━━`,
    `姓名：${userName}`,
    `主要类型：${typeInfo[primary].emoji} ${typeInfo[primary].name}`,
    `副型：${typeInfo[secondary].emoji} ${typeInfo[secondary].name}`,
    `━━━━━━━━━━━━━━━━`,
    `📊 分数明细：`,
    `  ${typeInfo['D'].emoji} D型：${totals.D}分（优点${scores.D.v} / 缺点${scores.D.w}）`,
    `  ${typeInfo['I'].emoji} I型：${totals.I}分（优点${scores.I.v} / 缺点${scores.I.w}）`,
    `  ${typeInfo['S'].emoji} S型：${totals.S}分（优点${scores.S.v} / 缺点${scores.S.w}）`,
    `  ${typeInfo['C'].emoji} C型：${totals.C}分（优点${scores.C.v} / 缺点${scores.C.w}）`,
    `━━━━━━━━━━━━━━━━`
  ].join('\n');

  // 提交到 Supabase 云端数据库（带重试，防弱网/高并发静默丢数据）
  try {
    await insertWithRetry({
      name: userName,
      primary_type: primary,
      secondary_type: secondary,
      score_d: totals.D,
      score_i: totals.I,
      score_s: totals.S,
      score_c: totals.C
    });
    statusEl.innerHTML += '<br>☁️ 结果已安全存入云端数据库';
  } catch(e) {
    console.error('Supabase 提交失败:', e);
    statusEl.innerHTML += '<br>⚠️ 云端保存失败，但你的结果已生成，可复制发群';
  }


  // 更新状态
  statusEl.innerHTML = '✅ 结果已生成！<br>📋 <strong>请复制下方结果发送给Jamie</strong>';
  statusEl.className = 'submit-status success';

  // 在结果弹窗中加入分享区域
  setTimeout(() => {
    const modal = document.getElementById('resultModal');
    if (!modal || modal.querySelector('.share-section')) return;
    
    const shareBox = document.createElement('div');
    shareBox.className = 'share-section';
    shareBox.style.cssText = 'margin-top:16px;padding:16px;background:#f0f4ff;border-radius:8px;border:2px dashed #667eea;';
    shareBox.innerHTML = `
      <p style="font-weight:700;margin-bottom:8px;color:#667eea;">📋 把你的结果发给Jamie：</p>
      <p style="font-size:0.85em;color:#666;margin-bottom:8px;">一键复制后，粘贴到企业微信群里👇</p>
      <textarea id="shareText" style="width:100%;height:140px;border:1px solid #ddd;border-radius:6px;padding:10px;font-size:0.9em;background:#fff;resize:vertical;" readonly>${summary}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
        <button onclick="copyShareText()" style="flex:1;padding:10px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.95em;">📋 一键复制结果</button>
        <button onclick="openWecom()" style="flex:1;padding:10px 20px;background:#07c160;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.95em;">💬 打开企业微信</button>
      </div>
      <p style="margin-top:8px;font-size:0.8em;color:#999;">粘贴到企业微信群后，Jamie就能看到你的结果了</p>
    `;
    modal.appendChild(shareBox);
  }, 200);
}

function copyShareText() {
  const ta = document.getElementById('shareText');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 99999);
  document.execCommand('copy');
  const btn = ta.parentElement.querySelector('button:first-of-type');
  btn.textContent = '✅ 已复制到剪贴板！';
  btn.style.background = 'linear-gradient(135deg,#27ae60,#2ecc71)';
  setTimeout(() => {
    btn.textContent = '📋 一键复制结果';
    btn.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
  }, 2500);
}

function openWecom() {
  // 尝试打开企业微信
  window.open('weixin://', '_blank');
  // 提示用户
  setTimeout(() => {
    alert('如果企业微信没打开，请手动打开企业微信，然后粘贴刚才复制的结果到群里');
  }, 500);
}




// Close overlay on background click
document.getElementById('resultOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeResult();
});

buildQuestionnaire();
